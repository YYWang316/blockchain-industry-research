schema_version: 1

# Pure data file. Read at runtime by agents/subject_class_resolver.md and
# agents/sec_email_gate.md. Design rationale, schema documentation, and
# the agent-drafts-user-confirms maintenance contract live in
# references/subject_relationships_design.md — read that file to understand
# why this file is shaped the way it is.
#
# Do NOT edit this file by hand. Entries are added via the path (a)/(b)/(c)
# workflow when subject_class_resolver hits an unknown entity during a real
# research run. Manual edits skip the provenance discipline (confirmed_by,
# sources, etc.) and risk corrupting the contract.

entries:
  Circle:
    subject_entity_type: company
    listed: true
    ticker: CRCL
    exchange: NYSE
    relationship_to_subject: self
    confirmed_by: user
    confirmed_at: 2026-05-13
    sources:
      - https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001876042
      - https://investor.circle.com/
    next_review_due: 2026-11-13
    note: |
      Circle Internet Group (parent of Circle Internet Financial).
      Issues USDC and EURC. Operates Arc (settlement chain).
      When researching USDC, Arc, or EURC, this entry is the
      parent_or_issuer with `relationship_to_subject` overridden
      at runtime to `issuer` (for USDC/EURC) or `parent_chain_operator` (for Arc).

  Coinbase:
    subject_entity_type: company
    listed: true
    ticker: COIN
    exchange: NASDAQ
    relationship_to_subject: self
    confirmed_by: user
    confirmed_at: 2026-05-13
    sources:
      - https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001679788
      - https://investor.coinbase.com/
    next_review_due: 2026-11-13
    note: |
      Coinbase Global. Operates Coinbase Wallet, Coinbase Exchange,
      and Base (L2 chain). When researching Base, this entry is the
      parent_or_issuer with `relationship_to_subject` overridden at
      runtime to `parent_chain_operator`. CIK 0001679788 should be
      re-verified at next_review_due; current value is best-effort
      and was not directly confirmed against EDGAR (path-(a) draft
      explicitly cannot use SEC EDGAR — see
      references/subject_relationships_design.md §Workflow contract,
      and TD-011 in references/TODO.md).

  Galaxy Digital:
    subject_entity_type: company
    listed: true
    ticker: GLXY
    exchange: NASDAQ/TSX
    relationship_to_subject: self
    confirmed_by: user
    confirmed_at: 2026-05-13
    sources:
      - https://www.galaxy.com/investor-relations
    next_review_due: 2026-11-13
    note: |
      Galaxy Digital Holdings. Dual-listed NASDAQ (GLXY) and Toronto
      (TSX:GLXY); `exchange` recorded as "NASDAQ/TSX" to capture both.
      Crypto financial services: trading, asset management, mining.
      Mostly relevant when researched as the subject itself (no chain
      or token issuance under the same legal entity).

  Marathon Digital:
    subject_entity_type: company
    listed: true
    ticker: MARA
    exchange: NASDAQ
    relationship_to_subject: self
    confirmed_by: user
    confirmed_at: 2026-05-13
    sources:
      - https://ir.mara.com/
    next_review_due: 2026-11-13
    note: |
      MARA Holdings (formerly Marathon Digital Holdings). Bitcoin mining;
      SEC 10-K is the primary source for hashrate, operating cost, and
      reserve disclosures. Mostly relevant when researched as the subject
      itself; not a parent of any chain in the taxonomy.

  Robinhood:
    subject_entity_type: company
    listed: true
    ticker: HOOD
    exchange: NASDAQ
    relationship_to_subject: self
    confirmed_by: user
    confirmed_at: 2026-05-13
    sources:
      - https://investors.robinhood.com/
    next_review_due: 2026-11-13
    note: |
      Robinhood Markets. Operates Robinhood Crypto as an internal product
      (not a separate acquired entity). For wallet-class crypto research
      targeting Robinhood Crypto, this entry is the relevant parent_or_issuer
      with `relationship_to_subject` overridden at runtime to `parent`
      (the crypto product is a division of Robinhood Markets, not a
      separately-incorporated entity).

  Stripe:
    subject_entity_type: company
    listed: false
    ticker: null
    exchange: null
    relationship_to_subject: self
    confirmed_by: user
    confirmed_at: 2026-05-13
    sources:
      - https://stripe.com/about
    next_review_due: 2026-08-13
    review_cadence_months: 3
    note: |
      Private. Acquired Bridge (2024) and operates Stripe Crypto. Operates
      Tempo (settlement chain). When researching Bridge or Tempo, this
      entry is the parent_or_issuer with `relationship_to_subject`
      overridden at runtime to `parent` (for Bridge) or
      `parent_chain_operator` (for Tempo). P0_sec_email auto-skips when
      Stripe is the only relevant entity for a run (listed=false; no SEC
      filings to fetch). 3-month review cadence (vs the 6-month default)
      due to active IPO speculation — a Stripe IPO flips
      `listed: false → true` and dramatically changes
      `P0_sec_email.applies_when` results, so the asymmetric cost of
      missing the transition justifies tighter cadence. Override expressed
      via `review_cadence_months: 3`.

